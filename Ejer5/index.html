<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trabajo Práctico HTML & CSS</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
    
<div class="xp-bar">
    <button onclick="window.location.href='../Menu/index.html'">
        ⬅ Volver al menú
    </button>
</div>
    
  <!-- Nivel 1: Tres cuadrados de colores -->
  <section class="nivel" id="nivel1">
    <h2 class="nivel-titulo">Nivel 1</h2>
    <div class="cuadrados">
      <div class="cuadrado rojo">rojo</div>
      <div class="cuadrado verde">verde</div>
      <div class="cuadrado azul">azul</div>
    </div>
  </section>
 
  <!-- Nivel 2: Lista de cursos con etiquetas -->
  <section class="nivel" id="nivel2">
    <h2 class="nivel-titulo">Nivel 2</h2>
    <div class="cursos-lista">
      <div class="curso-card">
        <span class="etiqueta nuevo">Nuevo</span>
        <h3 class="curso-titulo">Diseño Web</h3>
        <p class="curso-desc">Aprende HTML y CSS desde cero.</p>
      </div>
      <div class="curso-card">
        <span class="etiqueta popular">Popular</span>
        <h3 class="curso-titulo">JavaScript</h3>
        <p class="curso-desc">Programacion para el navegador.</p>
      </div>
      <div class="curso-card">
        <span class="etiqueta nuevo">Nuevo</span>
        <h3 class="curso-titulo">Backend</h3>
        <p class="curso-desc">Servidores y bases de datos.</p>
      </div>
    </div>
  </section>
 
  <!-- Nivel 3: Panel de estadísticas -->
  <section class="nivel" id="nivel3">
    <h2 class="nivel-titulo">Nivel 3</h2>
    <div class="stats-panel">
      <div class="stat-card">
        <span class="stat-numero">128</span>
        <span class="stat-label">ESTUDIANTES</span>
      </div>
      <div class="stat-card destacado">
        <span class="stat-numero">24</span>
        <span class="stat-label">CURSOS</span>
      </div>
      <div class="stat-card">
        <span class="stat-numero">98%</span>
        <span class="stat-label">APROBADOS</span>
      </div>
    </div>
  </section>
 
</body>
</html>
